<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria do Barcelona</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #181733 0%, #002856 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #FFD700;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        h1::after {
            content: '';
            display: block;
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #FFD700, #A50044, #004D98, transparent);
            margin: 10px auto;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            aspect-ratio: 1;
            background-color: #004D98;
            border: 2px solid transparent;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4);
            border-color: #FFD700;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 40, 86, 0.9), transparent);
            color: #FFD700;
            padding: 20px 10px 10px;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 1px 1px 2px black;
        }

        .gallery-item:hover .overlay {
            transform: translateY(0);
        }

        .player-number {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #FFD700;
            color: #004D98;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9em;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            border: 2px solid #A50044;
        }

        /* Responsividade */
        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .gallery {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Lendas do Barcelona ⚽</h1>
        
        <div class="gallery">
            <!-- Linha 1 -->
            <div class="gallery-item">
                <img src="https://assets.goal.com/images/v3/blt9b16e5d6480c6efc/GHP_MESSI-BOOTS_16-9.jpg?auto=webp&format=pjpg&width=3840&quality=60" alt="Lionel Messi">
                <div class="overlay">Lionel Messi</div>
                <div class="player-number">10</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://static.gazetaesportiva.com/uploads/ronaldinho-gaucc81cho-barcelona-20071209-006.webp" alt="Ronaldinho Gaúcho">
                <div class="overlay">Ronaldinho</div>
                <div class="player-number">10</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://www.fcbarcelona.com/fcbarcelona/photo/2019/03/12/62f67c7f-28fa-49d4-aa5f-9a0502c46c41/znYiAFfh.jpg" alt="Xavi Hernández">
                <div class="overlay">Xavi</div>
                <div class="player-number">6</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://assets.goal.com/images/v3/blt7f63b7ce117efc32/012c674d983be63d6de2841e4343672415608e3c.jpg?auto=webp&format=pjpg&width=3840&quality=60" alt="Andrés Iniesta">
                <div class="overlay">Iniesta</div>
                <div class="player-number">8</div>
            </div>
            
            <!-- Linha 2 -->
            <div class="gallery-item">
                <img src="https://preview.redd.it/g00wwalqrzq71.jpg?width=720&format=pjpg&auto=webp&s=e93d818b89b53619dece276056c1643b11ddc7ba" alt="Carles Puyol">
                <div class="overlay">Puyol</div>
                <div class="player-number">5</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://assets.goal.com/images/v3/blt1be2cbcc511a4b52/f3867a7d6f62277d12142a3eba578929bb6195ef.jpg?auto=webp&format=pjpg&width=3840&quality=60" alt="Neymar Jr">
                <div class="overlay">Neymar</div>
                <div class="player-number">11</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://lncimg.lance.com.br/cdn-cgi/image/width=950,quality=75,fit=pad,format=webp/uploads/2018/11/01/5bdaeff942e6b.jpeg" alt="Luis Suárez">
                <div class="overlay">Luis Suárez</div>
                <div class="player-number">9</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://a2.espncdn.com/combiner/i?img=%2Fphoto%2F2022%2F1202%2Fr1100595_1296x729_16%2D9.jpg" alt="busquets">
                <div class="overlay">Pedri</div>
                <div class="player-number">5</div>
            </div>
        </div>
    </div>
</body>
</html>
