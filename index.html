<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria do Barcelona</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #181733 0%, #002856 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #FFD700;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        h1::after {
            content: '';
            display: block;
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #FFD700, #A50044, #004D98, transparent);
            margin: 10px auto;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            aspect-ratio: 1;
            background-color: #004D98;
            border: 2px solid transparent;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4);
            border-color: #FFD700;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 40, 86, 0.9), transparent);
            color: #FFD700;
            padding: 20px 10px 10px;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 1px 1px 2px black;
        }

        .gallery-item:hover .overlay {
            transform: translateY(0);
        }

        .player-number {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #FFD700;
            color: #004D98;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9em;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            border: 2px solid #A50044;
        }

        /* Modal para ampliar imagem */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            border: 3px solid #FFD700;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #FFD700;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #A50044;
        }

        /* Responsividade */
        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .gallery {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Lendas do Barcelona ⚽</h1>
        
        <div class="gallery">
            <!-- Linha 1 -->
            <div class="gallery-item" onclick="openModal(this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Lionel_Messi_20180626.jpg" alt="Lionel Messi">
                <div class="overlay">Lionel Messi</div>
                <div class="player-number">10</div>
            </div>
            
            <div class="gallery-item" onclick="openModal(this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/34/Ronaldinho_Gaucho_%28cropped%29.jpg" alt="Ronaldinho Gaúcho">
                <div class="overlay">Ronaldinho Gaúcho</div>
                <div class="player-number">10</div>
            </div>
            
            <div class="gallery-item" onclick="openModal(this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Xavi_2012.jpg" alt="Xavi Hernández">
                <div class="overlay">Xavi Hernández</div>
                <div class="player-number">6</div>
            </div>
            
            <div class="gallery-item" onclick="openModal(this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/Andr%C3%A9s_Iniesta_2017.jpg" alt="Andrés Iniesta">
                <div class="overlay">Andrés Iniesta</div>
                <div class="player-number">8</div>
            </div>
            
            <!-- Linha 2 -->
            <div class="gallery-item" onclick="openModal(this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/8e/Carles_Puyol_2012.jpg" alt="Carles Puyol">
                <div class="overlay">Carles Puyol</div>
                <div class="player-number">5</div>
            </div>
            
            <div class="gallery-item" onclick="openModal(this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Neymar_2014.jpg" alt="Neymar Jr">
                <div class="overlay">Neymar Jr</div>
                <div class="player-number">11</div>
            </div>
            
            <div class="gallery-item" onclick="openModal(this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fc/Luis_Su%C3%A1rez_2018.jpg" alt="Luis Suárez">
                <div class="overlay">Luis Suárez</div>
                <div class="player-number">9</div>
            </div>
            
            <div class="gallery-item" onclick="openModal(this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Pedri_2021.jpg" alt="Pedri">
                <div class="overlay">Pedri González</div>
                <div class="player-number">8</div>
            </div>
        </div>
    </div>

    <!-- Modal para ampliar imagem -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        function openModal(element) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const img = element.querySelector('img');
            
            modal.style.display = 'flex';
            modalImg.src = img.src;
            modalImg.alt = img.alt;
            
            // Impedir que o clique se propague para o modal
            event.stopPropagation();
        }
        
        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.style.display = 'none';
        }
        
        // Fechar modal com a tecla ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
